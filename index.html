<!DOCTYPE html> 
  <html lang="en">                                                                                                                                                                                                                                  
  <head>          
      <meta charset="UTF-8" />                                                                                                                                                                                                                      
      <meta name="viewport" content="width=device-width, initial-scale=1.0"/>                                                                                                                                                                       
      <title>Customer Support Chat</title>                                                                                                                                                                                                          
      <style>                                                                                                                                                                                                                                       
          * { box-sizing: border-box; margin: 0; padding: 0; }                                                                                                                                                                                      
                                                                                                                                                                                                                                                    
          body {  
              font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;                                                                                                                                                                         
              background-color: #f4f4f4;                                                                                                                                                                                                            
          }                                                                                                                                                                                                                                         
                                                                                                                                                                                                                                                    
          .page-header {                                                                                                                                                                                                                            
              background-color: #003366;                                                                                                                                                                                                            
              color: white;                                                                                                                                                                                                                         
              padding: 15px 30px;                                                                                                                                                                                                                   
              font-size: 20px;                                                                                                                                                                                                                      
              font-weight: bold;                                                                                                                                                                                                                    
          }                                                                                                                                                                                                                                         
                                                                                                                                                                                                                                                    
          .chat-wrapper {                                                                                                                                                                                                                           
              max-width: 1200px;                                                                                                                                                                                                                    
              margin: 30px auto;                                                                                                                                                                                                                    
              background: #fff;                                                                                                                                                                                                                     
              border: 1px solid #ddd;                                                                                                                                                                                                               
              border-radius: 6px;                                                                                                                                                                                                                   
              overflow: hidden;                                                                                                                                                                                                                     
              box-shadow: 0 2px 8px rgba(0,0,0,0.1);                                                                                                                                                                                                
          }                                                                                                                                                                                                                                         
   
          iframe#sf-chat {                                                                                                                                                                                                                          
              width: 100%;
              height: 700px;                                                                                                                                                                                                                        
              border: none;                                                                                                                                                                                                                         
              display: block;                                                                                                                                                                                                                       
          }                                                                                                                                                                                                                                         
      </style>                                                                                                                                                                                                                                      
  </head>                                                                                                                                                                                                                                           
  <body>                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                    
      <div class="page-header">Customer Support</div>                                                                                                                                                                                               
                                                                                                                                                                                                                                                    
      <div class="chat-wrapper">                                                                                                                                                                                                                    
          <iframe 
              id="sf-chat"                                                                                                                                                                                                                          
              src="https://storm-b097d5168ac1af.my.salesforce-sites.com/ChatSupport/apex/CompositeChatPage"                                                                                                                                         
              frameborder="0"                                                                                                                                                                                                                       
              scrolling="auto"                                                                                                                                                                                                                      
              allow="microphone; camera"                                                                                                                                                                                                            
              title="Customer Support Chat">                                                                                                                                                                                                        
          </iframe>                                                                                                                                                                                                                                 
      </div>                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                    
      <script>                                                                                                                                                                                                                                      
          window.addEventListener('message', function(event) {
                                                                                                                                                                                                                                                    
              // Only accept messages from your Salesforce Site domain
              if (event.origin !== 'https://storm-b097d5168ac1af.my.salesforce-sites.com') return;                                                                                                                                                  
                                                                                                                                                                                                                                                    
              const iframe = document.getElementById('sf-chat');                                                                                                                                                                                    
                                                                                                                                                                                                                                                    
              if (event.data && event.data.type === 'RESIZE') {                                                                                                                                                                                     
                  iframe.style.height = (event.data.height + 50) + 'px';
              }                                                                                                                                                                                                                                     
          });
      </script>                                                                                                                                                                                                                                     
                                                                                                                                                                                                                                                    
  </body>                                                                                                                                                                                                                                           
  </html>
